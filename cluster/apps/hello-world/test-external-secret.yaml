apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-test
  namespace: default
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: onepassword-backend
    kind: ClusterSecretStore
  target:
    name: my-locally-injected-secret # This is the name of the normal k8s Secret it will create
  data:
  - secretKey: message
    remoteRef:
      key: k8s-test
      property: secret-message
