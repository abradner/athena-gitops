apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-test
  namespace: default
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: onepassword-backend
    kind: ClusterSecretStore
  target:
    name: my-locally-injected-secret 
  data:
  - secretKey: message
    remoteRef:
      key: k8s-test
      property: secret-message
