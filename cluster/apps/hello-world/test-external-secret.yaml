apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-test
  namespace: default
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: "1m"
  secretStoreRef:
    name: onepassword-backend
    kind: ClusterSecretStore
  target:
    name: my-locally-injected-secret 
  data:
  - secretKey: message
    remoteRef:
      # The new SDK requires the full 1Password URI path!
      key: "op://45c6bwx2kij5csv7m6qzu67xpi/k8s-test/secret-message"

