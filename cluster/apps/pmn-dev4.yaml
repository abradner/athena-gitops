---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pmn-core-dev4
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/abradner/pmn-workloads.git
    targetRevision: HEAD
    path: pmn-core/overlay/dev4
  destination:
    server: https://kubernetes.default.svc
    namespace: pmn-dev4
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
