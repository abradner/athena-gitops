apiVersion: "cilium.io/v2"
kind: CiliumLoadBalancerIPPool
metadata:
  name: homelab-pool
spec:
  blocks:
  - cidr: "10.10.80.240/28"
---
apiVersion: "cilium.io/v2alpha1"
kind: CiliumL2AnnouncementPolicy
metadata:
  name: default-l2-policy
spec:
  interfaces:
  - enp0s11 # Ensure this matches the primary interface name on your Talos nodes
  externalIPs: true
  loadBalancerIPs: true
