cluster:
    id: {{ cluster.id }}
    secret: {{ cluster.secret }}
secrets:
    bootstraptoken: {{ secrets.bootstraptoken }}
    secretboxencryptionsecret: {{ secrets.secretboxencryptionsecret }}
trustdinfo:
    token: {{ trustdinfo.token }}
certs:
    etcd:
        crt: {{ certs.etcd.crt }}
        key: {{ certs.etcd.key }}
    k8s:
        crt: {{ certs.k8s.crt }}
        key: {{ certs.k8s.key }}
    k8saggregator:
        crt: {{ certs.k8saggregator.crt }}
        key: {{ certs.k8saggregator.key }}
    k8sserviceaccount:
        key: {{ certs.k8sserviceaccount.key }}
    os:
        crt: {{ certs.os.crt }}
        key: {{ certs.os.key }}
